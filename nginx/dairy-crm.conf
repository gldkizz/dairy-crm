# Host nginx site config for dairy-crm alongside other sites.
# Does NOT take over port 80 — listens on 8080 so the existing site keeps :80.
#
# Install:
#   sudo cp nginx/dairy-crm.conf /etc/nginx/sites-available/dairy-crm
#   sudo ln -sf /etc/nginx/sites-available/dairy-crm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 8080/tcp   # if firewall is on
#
# Open: http://YOUR_IP:8080
# In .env: APP_URL=http://YOUR_IP:8080

server {
    listen 8080;
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
