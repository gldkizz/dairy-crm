services:
  db:
    image: postgres:16-alpine
    container_name: dairy-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: dairy_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d dairy_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dairy-crm-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://crm:crm@db:5432/dairy_crm?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dairy-crm-dev-secret-change-in-production}
      AUTH_URL: ${APP_URL:-http://localhost}
      NEXTAUTH_URL: ${APP_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
